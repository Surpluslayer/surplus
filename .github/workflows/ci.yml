name: ci
# Gate on main: run the full test suite on every push and PR. This is the
# guardrail that was missing -- parallel sessions pushed to main WITHOUT running
# pytest, so main repeatedly went red (email-sync/dedup tests collided with a
# shipped behavior change and nobody noticed). A red run here now blocks/flags
# the merge instead of shipping the breakage to the deploy.
#
# The frontend is built first so the dist-dependent tests (host routing serves
# the real SPA HTML) run for real instead of being skipped.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  # One run per ref; a newer push cancels an in-flight run on the same branch.
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      # --- Frontend build (produces frontend/dist for the routing tests) ---
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      # --- Backend test suite ---
      # Match the prod runtime (Dockerfile: python:3.12.8-slim), NOT a dev box's
      # older Python -- requirements pin numpy==2.4.6 which needs >=3.11.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: python -m pytest tests/ -q
